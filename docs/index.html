<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="refresh" content="900">
<title>Analista — Portal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }

header {
  background: #161b22;
  border-bottom: 1px solid #30363d;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-shrink: 0;
}
header h1 { font-size: 1.1rem; color: #58a6ff; font-weight: 600; }
header .sub { font-size: .78rem; color: #8b949e; margin-left: auto; }

.tabs {
  display: flex;
  gap: 4px;
  padding: 10px 20px 0;
  background: #161b22;
  border-bottom: 1px solid #30363d;
  flex-shrink: 0;
}
.tab {
  padding: 8px 18px;
  border-radius: 6px 6px 0 0;
  border: 1px solid transparent;
  border-bottom: none;
  cursor: pointer;
  font-size: .85rem;
  font-weight: 500;
  color: #8b949e;
  background: transparent;
  transition: all .15s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.tab:hover { color: #e6edf3; background: #21262d; }
.tab.active {
  color: #e6edf3;
  background: #0d1117;
  border-color: #30363d;
  position: relative;
  bottom: -1px;
}

.content { flex: 1; position: relative; overflow: hidden; }
iframe {
  width: 100%; height: 100%; border: none;
  display: none;
}
iframe.active { display: block; }

.open-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 5px;
  border: 1px solid #30363d;
  background: transparent;
  color: #8b949e;
  font-size: .78rem;
  cursor: pointer;
  text-decoration: none;
  transition: all .15s;
}
.open-btn:hover { color: #e6edf3; border-color: #8b949e; background: #21262d; }
</style>
</head>
<body>

<header>
  <span style="font-size:1.3rem">📊</span>
  <h1>Analista</h1>
  <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
    <a class="open-btn" id="btn-open" href="over25_dashboard.html" target="_blank">
      ↗ Abrir separado
    </a>
    <a class="open-btn" href="https://github.com/nunovinhas-creator/Analista" target="_blank">
      GitHub
    </a>
  </div>
</header>

<div class="tabs">
  <a class="tab active" data-target="frame-o25" href="#over25" onclick="switchTab(event,'frame-o25','over25_dashboard.html')">
    🎯 Over 2.5 Scanner
  </a>
  <a class="tab" data-target="frame-fb" href="#football" onclick="switchTab(event,'frame-fb','football_dashboard.html')">
    ⚽ Matemática Da Bola
  </a>
  <a class="tab" data-target="frame-today" href="#hoje" onclick="switchTab(event,'frame-today','today_dashboard.html')">
    📅 Hoje e Amanhã
  </a>
</div>

<div class="content">
  <iframe id="frame-o25" class="active"></iframe>
  <iframe id="frame-fb"></iframe>
  <iframe id="frame-today"></iframe>
</div>

<script>
const ts = Date.now();
document.getElementById('frame-o25').src    = 'over25_dashboard.html?v='   + ts;
document.getElementById('frame-fb').src     = 'football_dashboard.html?v=' + ts;
document.getElementById('frame-today').src  = 'today_dashboard.html?v='    + ts;

function switchTab(e, frameId, href) {
  e.preventDefault();
  document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(frameId).classList.add('active');
  e.currentTarget.classList.add('active');
  document.getElementById('btn-open').href = href;
}
</script>
</body>
</html>
