name: Analista

on:
  schedule:
    # Análise a cada 2 horas (mantém dashboards actualizados)
    - cron: "0 */2 * * *"
    # Relatório completo + email — 20:30 UTC = 21:30 Lisboa (UTC+1)
    - cron: "30 20 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "analyze | report"
        required: false
        default: "analyze"

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Determinar modo
        id: mode
        run: |
          HOUR=$(date -u +%H)
          MINUTE=$(date -u +%M)
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ "$INPUT_MODE" = "report" ]; then
            echo "mode=report" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "20" ] && [ "$MINUTE" -ge "25" ]; then
            echo "mode=report" >> $GITHUB_OUTPUT
          else
            echo "mode=analyze" >> $GITHUB_OUTPUT
          fi

      - name: Executar Analista
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py ${{ steps.mode.outputs.mode }}

      - name: Commit e push dashboards
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          git config user.name  "analista-bot"
          git config user.email "analista@noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "update: $(date -u +'%Y-%m-%dT%H:%M') [${{ steps.mode.outputs.mode }}]"
          pushed=false
          for i in 1 2 3 4; do
            if git pull --rebase origin "$BRANCH" && git push origin HEAD:"$BRANCH"; then
              pushed=true && break
            fi
            echo "Push falhou (tentativa $i), a aguardar $((i * 2))s..."
            sleep $((i * 2))
          done
          $pushed || { echo "[ERROR] Push falhou após 4 tentativas"; exit 1; }
